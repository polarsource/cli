name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: polar-darwin-arm64
            os: ubuntu-latest
            ext: tar.gz
            binary: polar
          - target: bun-darwin-x64
            artifact: polar-darwin-x64
            os: ubuntu-latest
            ext: tar.gz
            binary: polar
          - target: bun-linux-x64
            artifact: polar-linux-x64
            os: ubuntu-latest
            ext: tar.gz
            binary: polar
          - target: bun-windows-x64
            artifact: polar-windows-x64
            os: ubuntu-latest
            ext: zip
            binary: polar.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build binary
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.binary }}

      - name: Package binary (tar.gz)
        if: matrix.ext == 'tar.gz'
        run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.binary }}

      - name: Package binary (zip)
        if: matrix.ext == 'zip'
        run: zip ${{ matrix.artifact }}.zip ${{ matrix.binary }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum polar-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            polar-*
            checksums.txt
          generate_release_notes: true
